<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campaign Index</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0e0b07;
      --surface:      #1a1208;
      --border:       #3a2a10;
      --title-color:  #e8dcc8;
      --muted:        #a09080;
      --body:         #c8b89a;
      --accent:       #c8a040;
      --hover-bg:     #241a0c;
    }

    body {
      font-family: 'IM Fell English', Georgia, serif;
      background: var(--bg);
      color: var(--body);
      min-height: 100vh;
      padding: 4rem 2rem;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      max-width: 680px;
      margin: 0 auto 3.5rem;
      text-align: center;
    }

    header p.eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 600;
      color: var(--title-color);
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    header .rule {
      width: 80px;
      height: 1px;
      background: rgba(180, 160, 130, 0.3);
      margin: 0 auto;
    }

    /* ── Session list ───────────────────────────────────────── */
    ol {
      max-width: 680px;
      margin: 0 auto;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
      border: 1px solid var(--border);
    }

    li a {
      display: flex;
      align-items: baseline;
      gap: 1.2rem;
      padding: 1.1rem 1.4rem;
      background: var(--surface);
      text-decoration: none;
      transition: background 0.15s ease;
    }

    li a:hover {
      background: var(--hover-bg);
    }

    li + li {
      border-top: 1px solid var(--border);
    }

    /* Session number */
    .num {
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      min-width: 2.4rem;
      padding-top: 2px;
      flex-shrink: 0;
    }

    /* Session info */
    .info {
      flex: 1;
    }

    .info .session-title {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--title-color);
      margin-bottom: 0.2rem;
    }

    .info .session-subtitle {
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
    }

    /* Arrow */
    .arrow {
      color: var(--accent);
      font-size: 14px;
      opacity: 0.5;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    li a:hover .arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* ── Placeholder (unreleased sessions) ──────────────────── */
    li.locked a {
      cursor: default;
      pointer-events: none;
      opacity: 0.35;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      max-width: 680px;
      margin: 3rem auto 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      opacity: 0.5;
      font-style: italic;
    }
  </style>
</head>

<body>

  <header>
    <!-- ✏️  Edit campaign name and tagline -->
    <p class="eyebrow">Dungeon Master's Index</p>
    <h1>The Ashes of Valdrun</h1>
    <div class="rule"></div>
  </header>

  <!--
  ════════════════════════════════════════════════════════════
  ✏️  SESSION LIST

  Each <li> is one session. To add a session:
    1. Copy an existing <li>…</li> block
    2. Update the number, title, subtitle, and href

  To mark a session as not yet written, add class="locked"
  to the <li> — it will appear greyed out and unclickable.

  The href is the path to the prelude relative to this file:
    session-01/prelude.html
    session-02/prelude.html
    etc.
  ════════════════════════════════════════════════════════════
  -->
  <ol>

    <li>
      <a href="old_abyssus_setup/prelude.html">
        <span class="num">01</span>
        <span class="info">
          <div class="session-title">Abyssus</div>
          <div class="session-subtitle">A tale of ruin, vengeance, and what endures the flame</div>
        </span>
        <span class="arrow">→</span>
      </a>
    </li>

    <li class="locked">
      <a href="session-02/prelude.html">
        <span class="num">02</span>
        <span class="info">
          <div class="session-title">Apathy</div>
          <div class="session-subtitle">Not yet written</div>
        </span>
        <span class="arrow">→</span>
      </a>
    </li>

    <li class="locked">
      <a href="session-03/prelude.html">
        <span class="num">03</span>
        <span class="info">
          <div class="session-title">Session III</div>
          <div class="session-subtitle">Not yet written</div>
        </span>
        <span class="arrow">→</span>
      </a>
    </li>

  </ol>

</body>
</html>
