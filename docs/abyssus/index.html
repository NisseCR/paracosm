<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssus</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../shared/css/base.css">

    <style>
        :root {
            --bg: #070605;
            --panel: #120f0c;
            --border: rgba(200, 176, 140, 0.18);
            --title: #e8dcc8;
            --text: #b8aa92;
            --muted: #847764;
            --accent: #c8a040;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        main {
            width: 100%;
            max-width: 28rem;
        }

        .panel {
            border: 1px solid var(--border);
            background: var(--panel);
            padding: 2rem 1.5rem;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--title);
            text-align: center;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            color: var(--muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.9rem 1rem;
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.01);
        }

        a:hover {
            border-color: rgba(200, 160, 64, 0.35);
        }

        .label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--title);
        }

        .meta {
            font-size: 0.85rem;
            color: var(--muted);
            font-style: italic;
        }

        .arrow {
            color: var(--accent);
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<main>
    <section class="panel" aria-labelledby="story-title">
        <h1 id="story-title">Abyssus</h1>
        <p class="subtitle">Chapter selector</p>

        <nav aria-label="Chapter selection">
            <a href="prologue.html">
                    <span>
                        <span class="label">Prologue</span><br>
                        <span class="meta">Begin the story</span>
                    </span>
                <span class="arrow">→</span>
            </a>

            <a href="chapter-1.html">
                    <span>
                        <span class="label">Chapter I</span><br>
                        <span class="meta">Continue onward</span>
                    </span>
                <span class="arrow">→</span>
            </a>
        </nav>
    </section>
</main>
</body>
</html>
